
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GolpoBox</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
color:white;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:16px 4%;
z-index:99999;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,0.88);
backdrop-filter:blur(12px);

border-bottom:1px solid rgba(255,255,255,0.06);
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
}

.logo img{
width:54px;
height:54px;
border-radius:16px;
object-fit:cover;

box-shadow:
0 0 25px rgba(255,0,170,0.30),
0 0 45px rgba(123,44,255,0.20);
}

.logo span{

font-size:32px;
font-family:'Orbitron',sans-serif;
font-weight:800;

background:linear-gradient(
90deg,
#ffffff,
#ff6ec7,
#ff008c,
#8a2eff,
#5ce1ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MENU */

nav{
display:flex;
align-items:center;
gap:22px;
}

nav a{
color:white;
text-decoration:none;
font-size:15px;
font-weight:600;
}

/* RIGHT */

.right-menu{
display:flex;
align-items:center;
gap:14px;
}

/* SEARCH */

.search-btn{
width:50px;
height:50px;
border:none;
border-radius:14px;
background:#151515;
color:white;
font-size:18px;
cursor:pointer;
}

/* LOGIN */

.login-btn{
padding:14px 28px;
border:none;
border-radius:14px;
background:white;
color:black;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* PROFILE */

.profile-box{
display:none;
align-items:center;
gap:10px;

background:#151515;

padding:8px 14px;

border-radius:14px;
}

.profile-box img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.profile-box span{
font-size:15px;
font-weight:600;
}

.logout-btn{
padding:10px 16px;
border:none;
border-radius:12px;
background:#ff004f;
color:white;
font-size:14px;
font-weight:700;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

/* KEEP OLD BACKGROUND */

.hero::before{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(to top,rgba(0,0,0,0.95),rgba(0,0,0,0.40)),
url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

/* CONTENT */

.hero-content{
position:absolute;
left:5%;
bottom:90px;
z-index:10;
max-width:550px;
}

.hero-content h1{
font-size:74px;
font-weight:800;
line-height:1.05;
margin-bottom:16px;
}

.hero-content h1 span{

background:linear-gradient(
90deg,
#ff6ec7,
#ff008c,
#8a2eff,
#5ce1ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-content p{
font-size:19px;
line-height:1.8;
color:#ddd;
margin-bottom:30px;
}

/* WATCH */

.watch-btn{
padding:18px 34px;

border:none;
border-radius:14px;

background:#00d84a;

color:white;

font-size:18px;
font-weight:700;

cursor:pointer;

display:flex;
align-items:center;
gap:12px;
}

/* SECTION */

.section{
padding:70px 4%;
}

/* TOP */

.section-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
}

.section-top h2{
font-size:38px;
font-weight:800;
}

.section-top a{
color:white;
text-decoration:none;
}

/* MOVIES */

.movie-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:24px;
}

.movie-card{
background:#101010;
border-radius:22px;
overflow:hidden;
transition:0.4s;
}

.movie-card:hover{
transform:translateY(-8px);
}

.movie-card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

.movie-info{
padding:18px;
}

.movie-info h3{
font-size:22px;
margin-bottom:10px;
}

.movie-info p{
color:#bbb;
margin-bottom:16px;
}

.movie-info button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#00d84a;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
padding:20px;
}

.popup-box{
width:100%;
max-width:430px;

background:#111;

padding:36px;

border-radius:28px;

position:relative;
}

.popup-box h2{

margin-bottom:24px;

font-size:30px;

background:linear-gradient(
90deg,
#ffffff,
#ff6ec7,
#ff008c,
#8a2eff,
#5ce1ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.popup-box input,
.popup-box select{
width:100%;
padding:16px;
margin-bottom:16px;
border:none;
border-radius:14px;
background:#1a1a1a;
color:white;
font-size:15px;
}

.popup-box button{
width:100%;
padding:16px;

border:none;
border-radius:14px;

background:
linear-gradient(
90deg,
#ff6ec7,
#ff008c,
#8a2eff,
#5ce1ff
);

color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.close-popup{
position:absolute;
top:14px;
right:20px;
font-size:34px;
cursor:pointer;
}

/* PLAYER */

.player-modal{
position:fixed;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:999999999;
padding:20px;
}

.player-modal video{
width:100%;
max-width:1200px;
border-radius:18px;
background:black;
}

.close-player{
position:absolute;
top:20px;
right:30px;
font-size:45px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

header{
flex-wrap:wrap;
gap:18px;
}

nav{
width:100%;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.right-menu{
margin-left:auto;
}

.hero{
height:92vh;
}

.hero-content{
left:5%;
right:5%;
bottom:60px;
max-width:100%;
}

.hero-content h1{
font-size:48px;
}

.hero-content p{
font-size:16px;
}

.watch-btn{
width:100%;
justify-content:center;
}

.section-top h2{
font-size:30px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<a href="#" class="logo">

<img src="https://res.cloudinary.com/db1ulwbxc/image/upload/v1779044554/700906516_26654958984183418_6821224961536211562_n_lpfxqc.jpg">

<span>GolpoBox</span>

</a>

<nav>

<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="#">Drama</a>
<a href="#">Music</a>

</nav>

<div class="right-menu">

<button class="search-btn">
<i class="fa-solid fa-magnifying-glass"></i>
</button>

<button class="login-btn" onclick="openPopup()" id="loginBtn">
Login
</button>

<div class="profile-box" id="profileBox">

<img src="https://i.ibb.co/2kR8z5w/user.png">

<span id="profileName">User</span>

<button class="logout-btn" onclick="logoutUser()">
Logout
</button>

</div>

</div>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>

Unlimited <span>Movies</span><br>
TV Shows & Entertainment

</h1>

<p>

Watch premium entertainment instantly with direct streaming experience only on GolpoBox.

</p>

<button class="watch-btn"
onclick="playMovie('https://res.cloudinary.com/db1ulwbxc/video/upload/v1779537590/RAKKHOSH___%E0%A6%95%E0%A7%8B%E0%A6%AA_%E0%A6%B6%E0%A7%81%E0%A6%B0%E0%A7%81___OFFICIAL_TRAILER___SIAM___SUSMITA___EID_UL_FITR_2026___REAL_ENERGY_PRODUCTION_1080P_HD_ibtulv.mp4')">

<i class="fa-solid fa-play"></i>

Watch Now

</button>

</div>

</section>

<!-- MOVIES -->

<section class="section">

<div class="section-top">

<h2>Recently Added</h2>

<a href="#">View More</a>

</div>

<div class="movie-grid">

<div class="movie-card">

<img src="https://res.cloudinary.com/db1ulwbxc/image/upload/v1779537495/20260523_175701_fvstcq.png">

<div class="movie-info">

<h3>RAKKHOSH</h3>

<p>Action Thriller</p>

<button
onclick="playMovie('https://res.cloudinary.com/db1ulwbxc/video/upload/v1779537590/RAKKHOSH___%E0%A6%95%E0%A7%8B%E0%A6%AA_%E0%A6%B6%E0%A7%81%E0%A6%B0%E0%A7%81___OFFICIAL_TRAILER___SIAM___SUSMITA___EID_UL_FITR_2026___REAL_ENERGY_PRODUCTION_1080P_HD_ibtulv.mp4')">

Watch Now

</button>

</div>

</div>

</div>

</section>

<!-- LOGIN + REGISTER -->

<div class="popup" id="mainPopup">

<div class="popup-box">

<span class="close-popup" onclick="closePopup()">×</span>

<h2>Login / Register</h2>

<input type="text" id="userName" placeholder="Enter Your Name">

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<select>

<option>Select Subscription Plan</option>

<option>1 Month - ৳25</option>

<option>6 Months - ৳150</option>

<option>1 Year - ৳300</option>

</select>

<button onclick="registerUser()">

Continue

</button>

</div>

</div>

<!-- PLAYER -->

<div class="player-modal" id="playerModal">

<span class="close-player" onclick="closePlayer()">×</span>

<video
id="videoPlayer"
controls
autoplay
playsinline
controlsList="nodownload noplaybackrate"
disablePictureInPicture
oncontextmenu="return false;">
</video>

</div>

<script>

/* POPUP */

function openPopup(){

document.getElementById('mainPopup').style.display='flex';

}

function closePopup(){

document.getElementById('mainPopup').style.display='none';

}

/* REGISTER */

function registerUser(){

let name=document.getElementById('userName').value;

if(name==""){

alert("Enter Your Name");

return;

}

localStorage.setItem("golpoboxUser",name);

showProfile(name);

closePopup();

}

/* SHOW PROFILE */

function showProfile(name){

document.getElementById('profileName').innerText=name;

document.getElementById('profileBox').style.display='flex';

document.getElementById('loginBtn').style.display='none';

}

/* LOGOUT */

function logoutUser(){

localStorage.removeItem("golpoboxUser");

document.getElementById('profileBox').style.display='none';

document.getElementById('loginBtn').style.display='block';

}

/* AUTO LOGIN */

window.onload=function(){

let savedUser=localStorage.getItem("golpoboxUser");

if(savedUser){

showProfile(savedUser);

}

}

/* VIDEO */

const modal=document.getElementById('playerModal');

const video=document.getElementById('videoPlayer');

function playMovie(url){

modal.style.display='flex';

video.src=url;

video.load();

video.play();

}

function closePlayer(){

modal.style.display='none';

video.pause();

video.removeAttribute('src');

video.load();

}

/* RIGHT CLICK DISABLE */

document.addEventListener('contextmenu', event => event.preventDefault());

</script>

</body>
</html>
